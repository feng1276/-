<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>猜数字游戏</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        .game-container {
            text-align: center;
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        input {
            padding: 10px;
            font-size: 16px;
            margin: 10px;
            width: 200px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            margin: 10px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover {
            background-color: #45a049;
        }
        #message {
            margin-top: 20px;
            font-size: 18px;
            min-height: 24px;
        }
    </style>
</head>
<body>
    <a href="index.html" style="position: absolute; top: 20px; left: 20px; padding: 10px 20px; background-color: #95a5a6; color: white; text-decoration: none; border-radius: 5px; font-family: Arial, sans-serif;">返回</a>
    <div class="game-container">
        <h1>猜数字游戏</h1>
        <p>我已经想好了一个1到100之间的数字。你能猜出来吗？</p>
        <input type="number" id="guessInput" min="1" max="100" placeholder="输入你的猜测">
        <button onclick="checkGuess()">猜一猜</button>
        <button onclick="newGame()">新游戏</button>
        <div id="message"></div>
    </div>

    <script>
        let targetNumber;
        let attempts = 0;

        function newGame() {
            targetNumber = Math.floor(Math.random() * 100) + 1;
            attempts = 0;
            document.getElementById('guessInput').value = '';
            document.getElementById('message').textContent = '';
        }

        function checkGuess() {
            const guess = parseInt(document.getElementById('guessInput').value);
            if (isNaN(guess) || guess < 1 || guess > 100) {
                document.getElementById('message').textContent = '请输入1到100之间的数字！';
                return;
            }
            attempts++;
            if (guess === targetNumber) {
                document.getElementById('message').textContent = `恭喜！你猜对了！答案是 ${targetNumber}。你用了 ${attempts} 次尝试。`;
            } else if (guess < targetNumber) {
                document.getElementById('message').textContent = '太小了！再试试。';
            } else {
                document.getElementById('message').textContent = '太大了！再试试。';
            }
        }

        // 初始化游戏
        newGame();
    </script>
</body>
</html>
