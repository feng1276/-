<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>按钮</title>
    <style>
        .time-display {
            position: fixed;
            top: 20px;
            right: 20px;
            font-size: 18px;
            color: white;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 15px;
            border-radius: 8px;
            font-weight: bold;
        }
    </style>
</head>
<body style="background-color: gray;">
    <div class="time-display" id="timeDisplay"></div>
    <a href="index.html" style="position: absolute; top: 20px; left: 20px; padding: 10px 20px; background-color: #95a5a6; color: white; text-decoration: none; border-radius: 5px; font-family: Arial, sans-serif;">返回</a>
    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: Arial, sans-serif;">
        <h1 id="counter" style="font-size: 72px; margin-bottom: 30px;">0</h1>
        <div style="display: flex; gap: 20px;">
            <button id="decreaseBtn" onclick="decrease()" style="padding: 15px 30px; font-size: 18px; background-color: #e74c3c; color: white; border: none; border-radius: 5px; cursor: pointer;">减一</button>
            <button id="resetBtn" onclick="reset()" style="padding: 15px 30px; font-size: 18px; background-color: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer;">重置</button>
            <button id="increaseBtn" onclick="increase()" style="padding: 15px 30px; font-size: 18px; background-color: #2ecc71; color: white; border: none; border-radius: 5px; cursor: pointer;">加一</button>
        </div>
    </div>

    <script>
        let count = 0;
        const counterElement = document.getElementById('counter');

        function increase() {
            count++;
            counterElement.textContent = count;
        }

        function decrease() {
            if (count > 0) {
                count--;
                counterElement.textContent = count;
            }
        }

        function reset() {
            count = 0;
            counterElement.textContent = count;
        }

        function updateTime() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');

            const timeString = `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
            document.getElementById('timeDisplay').textContent = timeString;
        }

        updateTime();
        setInterval(updateTime, 1000);
    </script>
</body>
</html>'"
